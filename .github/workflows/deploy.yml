name: Deploy Node.js App to VPS (Prebuild)

on:
  workflow_dispatch:
    # This adds a manual trigger button in the GitHub Actions UI

  # push:
  #     branches:
  #         - main
  #         - release

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci

      - name: Prisma Generate
        run: npx prisma generate

      - name: Build Project
        run: npm run build

      - name: Clean Node modules
        run: |
          rm -rf node_modules
          npm install --production

      - name: Prepare Deployment Package
        run: |
          mkdir deploy
          cp -r dist src package.json package-lock.json node_modules deploy/
          cd deploy
          tar -czf ../artifact.tar.gz .

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Upload Artifact to VPS
        run: |
          scp -o StrictHostKeyChecking=no artifact.tar.gz ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }}:/tmp/artifact-sysMonitoring.tar.gz

      - name: Deploy on VPS
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} << 'EOF'
            set -e
            # Clean old app and kill PM2 processes
            pm2 delete sysMonitoring 2>/dev/null || true
            rm -rf /home/Safal/sysMonitoring
            mkdir -p /home/Safal/sysMonitoring

            # Extract new build
            tar -xzf /tmp/artifact-sysMonitoring.tar.gz -C /home/Safal/sysMonitoring
            rm /tmp/artifact-sysMonitoring.tar.gz

            cd /home/Safal/sysMonitoring

            # Copy .env file if needed
            cp /var/envs/sysMonitoring.env .env

            # Start fresh PM2 process with build output
            pm2 start dist/index.js --name sysMonitoring
          EOF
